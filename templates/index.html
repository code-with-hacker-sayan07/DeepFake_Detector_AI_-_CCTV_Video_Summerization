<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deepfake Anomaly Detection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="/static/css/styles.css" rel="stylesheet">
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen flex flex-col items-center py-10">

    <div class="max-w-3xl w-full bg-white shadow-xl rounded-2xl overflow-hidden">
        <div class="bg-blue-600 p-6 text-white text-center">
            <h1 class="text-3xl font-bold tracking-wide">Deepfake Anomaly Detection</h1>
            <p class="mt-2 text-blue-100">Upload an image or video to verify its authenticity.</p>
        </div>

        <div class="p-8">
            <div id="upload-zone" class="border-4 border-dashed border-gray-300 rounded-xl p-12 text-center cursor-pointer hover:border-blue-500 hover:bg-blue-50 transition-all">
                <div class="text-gray-500 mb-4">
                    <svg class="mx-auto h-16 w-16 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                    </svg>
                    <p class="text-lg font-medium">Drag and drop your file here</p>
                    <p class="text-sm mt-1">or click to browse (.jpg, .png, .mp4)</p>
                </div>
                <input type="file" id="file-input" class="hidden" accept=".jpg,.jpeg,.png,.mp4">
            </div>

            <div id="file-info" class="hidden mt-6 bg-gray-50 border border-gray-200 rounded-lg p-4 flex items-center justify-between">
                <div class="flex items-center">
                    <svg class="h-8 w-8 text-blue-500 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                    </svg>
                    <div>
                        <p id="file-name" class="font-medium text-gray-800"></p>
                        <p id="file-size" class="text-sm text-gray-500"></p>
                    </div>
                </div>
                <button id="scan-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-6 rounded-lg transition-colors">
                    Start Scan
                </button>
            </div>

            <div id="progress-container" class="hidden mt-8">
                <div class="flex justify-between mb-2">
                    <span class="text-sm font-medium text-blue-600">Analyzing media...</span>
                    <span id="progress-text" class="text-sm font-medium text-blue-600">0%</span>
                </div>
                <div class="w-full bg-gray-200 rounded-full h-2.5 overflow-hidden">
                    <div id="progress-bar" class="bg-blue-600 h-2.5 rounded-full transition-all duration-300" style="width: 0%"></div>
                </div>
                <p class="text-xs text-gray-500 mt-2 text-center animate-pulse">Running advanced machine learning inference...</p>
            </div>

            <div id="result-dashboard" class="hidden mt-8 p-6 rounded-xl border-2">
                <div class="text-center">
                    <h2 class="text-2xl font-bold mb-2" id="verdict-title"></h2>
                    <div class="flex items-center justify-center gap-2 mb-4">
                        <span class="text-4xl font-black" id="confidence-score"></span>
                        <span class="text-xl text-gray-500 font-medium">Confidence</span>
                    </div>
                    <p id="result-details" class="text-gray-600"></p>
                </div>
            </div>

            <div id="error-container" class="hidden mt-6 bg-red-50 border border-red-200 text-red-600 rounded-lg p-4 text-center">
                <p id="error-message"></p>
            </div>
        </div>
    </div>

    <script src="/static/js/main.js"></script>
</body>
</html>
